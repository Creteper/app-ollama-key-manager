version: '3.8'

services:
  ollama-key-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-key-manager
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Optional: Set your Claude and OpenAI API keys
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Database path
      - DATABASE_PATH=/app/data/keys.db
      # Admin password for initial setup (change this!)
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      # Persist SQLite database
      - ./data:/app/data:rw
    user: "1001:1001"  # Match the nextjs user from Dockerfile
    restart: unless-stopped
    networks:
      - ollama-network

  # Optional: Include Ollama service if you want to run it in the same compose
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - ollama-network

volumes:
  ollama-data:

networks:
  ollama-network:
    driver: bridge
