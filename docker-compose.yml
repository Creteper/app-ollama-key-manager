version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ollama-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ollama_keys}
      MYSQL_USER: ${MYSQL_USER:-ollama_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ollama_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - ollama-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-key-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-key-manager
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # MySQL connection
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-ollama_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-ollama_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-ollama_keys}
      # Optional: Set your Claude and OpenAI API keys
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Admin password for initial setup (change this!)
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ollama-network

  # Optional: Include Ollama service if you want to run it in the same compose
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - ollama-network

volumes:
  mysql-data:
  ollama-data:

networks:
  ollama-network:
    driver: bridge
